<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery — Zenfolio Prototype</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body.view-desktop #mobile-frame { max-width: 100%; }
  </style>
</head>
<body>
  <!-- Toggle button injected by ZF.ViewToggle.init() -->

  <div id="mobile-frame">
    <div class="page-container">

      <header class="page-header">
        <h1>Photo Gallery</h1>
        <button class="btn btn-primary" id="download-all-btn">&#8595; Download All</button>
      </header>

      <section id="photo-grid" class="photo-grid" aria-label="Photo gallery">
        <!-- Cards injected by JS -->
      </section>

      <!-- Mobile: sticky Download Photos bar at bottom -->
      <div class="mobile-download-bar">
        <button class="btn btn-primary" id="download-all-mobile-btn">&#8595; Download Photos</button>
      </div>

    </div>

    <!-- Lightbox — desktop only, inside frame -->
    <div id="lightbox" class="lightbox-overlay" hidden aria-modal="true" role="dialog">
      <button class="lightbox-close" id="lightbox-close" title="Close">&times;</button>
      <button class="lightbox-nav lightbox-prev" id="lightbox-prev" title="Previous">&#8249;</button>
      <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-footer">
          <span class="lightbox-counter" id="lightbox-counter"></span>
          <button class="btn btn-primary lightbox-dl-btn" id="lightbox-download">&#8595; Download</button>
        </div>
      </div>
      <button class="lightbox-nav lightbox-next" id="lightbox-next" title="Next">&#8250;</button>
    </div>

    <!-- Email capture modal — inside frame so it clips to phone bounds in mobile view -->
    <div id="email-modal" class="modal-overlay" hidden aria-modal="true" role="dialog" aria-labelledby="email-modal-title">
    <div class="modal-card">

      <!-- Panel 1: email entry -->
      <div id="email-entry-panel">
        <h2 id="email-modal-title">Download All Photos</h2>
        <p style="font-size:0.9rem;color:#555;margin-bottom:16px;">
          Enter your email address and we'll send a confirmation with a link to download your ZIP.
        </p>
        <div class="form-group">
          <label for="email-input">Email address</label>
          <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
          <span class="form-error" id="email-error" hidden></span>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="email-cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="email-submit-btn">Submit</button>
        </div>
      </div>

      <!-- Panel 2: email sent + countdown -->
      <div id="email-sent-panel" hidden>
        <div class="email-sent-icon">&#10003;</div>
        <h2>Email Sent!</h2>
        <p style="font-size:0.9rem;color:#555;margin:12px 0 8px;">
          A confirmation has been sent to <strong id="email-sent-address"></strong>.
        </p>
        <p style="font-size:0.9rem;color:#888;">
          Redirecting to your download page in <strong id="countdown-display">5</strong>…
        </p>
      </div>

    </div><!-- /.modal-card -->
    </div><!-- /#email-modal -->

  </div><!-- /#mobile-frame -->

  <script src="app.js"></script>
  <script>
    (function () {
      const PHOTO_COUNT = 50;
      const RETURN_KEY = 'zf_return_status_url';
      let redirectTimer = null;
      let lightboxIndex = 1;

      // ── Init ──────────────────────────────────────────────────────────────
      ZF.ViewToggle.init();
      ZF.ScrollMemory.restore();
      buildGrid();
      wireLightbox();
      wireModal();

      // ── Immediate photo download (desktop) ────────────────────────────────
      async function downloadPhoto(index) {
        const url = ZF.Unsplash.url(index);
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = `photo-${index}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        } catch (e) {
          window.open(url, '_blank');
        }
      }

      // ── Build photo grid ──────────────────────────────────────────────────
      function buildGrid() {
        const grid = document.getElementById('photo-grid');
        for (let i = 1; i <= PHOTO_COUNT; i++) {
          const card = document.createElement('article');
          card.className = 'photo-card';
          card.dataset.photo = i;
          card.innerHTML = `
            <img src="${ZF.Unsplash.url(i)}" alt="Photo ${i}" loading="lazy">
            <div class="photo-overlay">
              <span class="photo-name">photo_${i}.jpg</span>
              <div class="photo-overlay-actions">
                <button class="photo-action-btn" data-photo="${i}" title="Download photo">&#8595;</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        }

        grid.addEventListener('click', (e) => {
          const btn  = e.target.closest('.photo-action-btn[data-photo]');
          const card = e.target.closest('.photo-card[data-photo]');
          const isMobile = ZF.ViewToggle.getMode() === 'mobile';

          if (btn) {
            e.stopPropagation();
            if (isMobile) {
              ZF.ScrollMemory.save();
              window.location.href = `individual-download.html?photo=${btn.dataset.photo}`;
            } else {
              downloadPhoto(parseInt(btn.dataset.photo));
            }
            return;
          }

          if (card) {
            if (isMobile) {
              ZF.ScrollMemory.save();
              window.location.href = `individual-download.html?photo=${card.dataset.photo}`;
            } else {
              openLightbox(parseInt(card.dataset.photo));
            }
          }
        });
      }

      // ── Lightbox ──────────────────────────────────────────────────────────
      function wireLightbox() {
        const lightbox = document.getElementById('lightbox');

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', () => navigateLightbox(-1));
        document.getElementById('lightbox-next').addEventListener('click', () => navigateLightbox(1));
        document.getElementById('lightbox-download').addEventListener('click', () => downloadPhoto(lightboxIndex));

        // Close on backdrop click
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox) closeLightbox();
        });
      }

      function openLightbox(index) {
        lightboxIndex = index;
        updateLightbox();
        const lightbox = document.getElementById('lightbox');
        lightbox.removeAttribute('hidden');
        document.addEventListener('keydown', lightboxKeyHandler);
      }

      function closeLightbox() {
        document.getElementById('lightbox').setAttribute('hidden', '');
        document.removeEventListener('keydown', lightboxKeyHandler);
      }

      function navigateLightbox(dir) {
        lightboxIndex = ((lightboxIndex - 1 + dir + PHOTO_COUNT) % PHOTO_COUNT) + 1;
        updateLightbox();
      }

      function updateLightbox() {
        const img = document.getElementById('lightbox-img');
        img.style.opacity = '0';
        img.src = ZF.Unsplash.url(lightboxIndex);
        img.onload = () => { img.style.opacity = '1'; };
        document.getElementById('lightbox-counter').textContent = `${lightboxIndex} / ${PHOTO_COUNT}`;
      }

      function lightboxKeyHandler(e) {
        if (e.key === 'Escape')     closeLightbox();
        if (e.key === 'ArrowLeft')  navigateLightbox(-1);
        if (e.key === 'ArrowRight') navigateLightbox(1);
      }

      // ── Modal wiring ──────────────────────────────────────────────────────
      function wireModal() {
        const modal     = document.getElementById('email-modal');
        const input     = document.getElementById('email-input');
        const errorEl   = document.getElementById('email-error');
        const submitBtn = document.getElementById('email-submit-btn');
        const cancelBtn = document.getElementById('email-cancel-btn');

        function openModal() {
          const existingUrl = sessionStorage.getItem(RETURN_KEY);
          if (existingUrl) {
            window.location.href = existingUrl;
            return;
          }
          document.getElementById('email-entry-panel').removeAttribute('hidden');
          document.getElementById('email-sent-panel').setAttribute('hidden', '');
          input.value = '';
          errorEl.setAttribute('hidden', '');
          if (redirectTimer) { clearInterval(redirectTimer); redirectTimer = null; }
          ZF.Modal.open(modal);
        }

        document.getElementById('download-all-btn').addEventListener('click', openModal);
        document.getElementById('download-all-mobile-btn').addEventListener('click', openModal);

        cancelBtn.addEventListener('click', () => {
          if (redirectTimer) { clearInterval(redirectTimer); redirectTimer = null; }
          ZF.Modal.close(modal);
        });

        submitBtn.addEventListener('click', handleSubmit);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSubmit(); });
      }

      function handleSubmit() {
        const input   = document.getElementById('email-input');
        const errorEl = document.getElementById('email-error');
        const email   = input.value.trim();

        if (!/.+@.+\..+/.test(email)) {
          errorEl.textContent = 'Please enter a valid email address.';
          errorEl.removeAttribute('hidden');
          input.focus();
          return;
        }

        document.getElementById('email-entry-panel').setAttribute('hidden', '');
        document.getElementById('email-sent-panel').removeAttribute('hidden');
        document.getElementById('email-sent-address').textContent = email;
        sessionStorage.removeItem('zf_return_status_url');

        let count = 5;
        document.getElementById('countdown-display').textContent = count;
        redirectTimer = setInterval(() => {
          count--;
          document.getElementById('countdown-display').textContent = count;
          if (count <= 0) {
            clearInterval(redirectTimer);
            redirectTimer = null;
            window.location.href = `download-status.html?email=${encodeURIComponent(email)}`;
          }
        }, 1000);
      }

    })();
  </script>
</body>
</html>
