<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Photo — Zenfolio Prototype</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Toggle button injected by ZF.ViewToggle.init() -->

  <div id="mobile-frame">

    <!-- ── Mobile mode: sticky instruction banner with nav ── -->
    <div id="mobile-banner" class="instruction-banner" hidden>
      <p class="banner-text">To download, long press on the image below and click Save.</p>
      <div class="banner-actions">
        <button class="btn btn-secondary" id="back-btn-mobile">&#8592; Back to Gallery</button>
        <div class="nav-right">
          <button class="btn btn-primary" id="next-btn-mobile" hidden>Next &#8594;</button>
        </div>
      </div>
    </div>

    <!-- ── Desktop mode: nav + download action bar ── -->
    <div id="desktop-header" class="desktop-download-header" hidden>
      <div class="banner-actions" style="width:100%">
        <button class="btn btn-secondary" id="back-btn-desktop">&#8592; Back to Gallery</button>
        <div class="nav-right">
          <button class="btn btn-primary btn-lg" id="download-photo-btn">&#8595; Download Photo</button>
          <button class="btn btn-secondary" id="next-btn-desktop" hidden>Next &#8594;</button>
        </div>
      </div>
    </div>

    <!-- ── Photo section (always visible) ── -->
    <section class="photo-section" id="photo-section">
      <img id="main-photo" alt="Photo" class="main-photo">

      <!-- Mobile-only label -->
      <p class="photo-save-label" id="longpress-label" hidden>Long press image to save</p>

      <!-- Error state: first failure -->
      <div id="error-first" class="image-error-box" hidden>
        <p>Image failed to load.</p>
        <button class="btn btn-secondary" id="refresh-btn">Refresh</button>
      </div>

      <!-- Error state: second+ failure -->
      <div id="error-persistent" class="image-error-box" hidden>
        <p>Image failed to load. If this persists, <a href="#">please contact support</a>.</p>
      </div>
    </section>

    <!-- Dev Controls -->
    <aside class="dev-controls" aria-label="Developer testing controls">
      <span class="dev-controls-label">&#9881; Dev Controls</span>
      <label>
        <input type="checkbox" id="simulate-fail">
        Simulate image load failure
      </label>
    </aside>

  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      const PHOTO_COUNT = 12;

      const rawParam = ZF.URLParams.get('photo');
      const rawIndex = parseInt(rawParam, 10);
      const photoIndex = isNaN(rawIndex)
        ? 1
        : Math.max(1, Math.min(PHOTO_COUNT, rawIndex));

      let failCount = 0;
      let simulateFail = false;

      // ── Init ──────────────────────────────────────────────────────────────
      ZF.ViewToggle.init();
      ZF.ViewToggle.onChange(applyViewMode);
      setupNavigation();
      setupSimulateCheckbox();
      loadPhoto();
      applyViewMode(ZF.ViewToggle.getMode());

      // ── View mode ─────────────────────────────────────────────────────────
      function applyViewMode(mode) {
        mode = mode || ZF.ViewToggle.getMode();
        const mobileBanner   = document.getElementById('mobile-banner');
        const desktopHeader  = document.getElementById('desktop-header');
        const longpressLabel = document.getElementById('longpress-label');

        if (mode === 'mobile') {
          mobileBanner.removeAttribute('hidden');
          desktopHeader.setAttribute('hidden', '');
          longpressLabel.removeAttribute('hidden');
        } else {
          mobileBanner.setAttribute('hidden', '');
          desktopHeader.removeAttribute('hidden');
          longpressLabel.setAttribute('hidden', '');
        }
      }

      // ── Navigation ────────────────────────────────────────────────────────
      function setupNavigation() {
        // Back buttons (mobile + desktop)
        document.getElementById('back-btn-mobile').addEventListener('click', goBack);
        document.getElementById('back-btn-desktop').addEventListener('click', goBack);

        function goBack() {
          ZF.ScrollMemory.restore();
          window.location.href = 'index.html';
        }

        // Next buttons
        ['next-btn-mobile', 'next-btn-desktop'].forEach(id => {
          const btn = document.getElementById(id);
          if (photoIndex >= PHOTO_COUNT) {
            btn.setAttribute('hidden', '');
          } else {
            btn.removeAttribute('hidden');
            btn.addEventListener('click', () => {
              window.location.href = `individual-download.html?photo=${photoIndex + 1}`;
            });
          }
        });

        // Desktop download button
        document.getElementById('download-photo-btn').addEventListener('click', downloadPhoto);
      }

      // ── Desktop download ──────────────────────────────────────────────────
      async function downloadPhoto() {
        const url = ZF.Unsplash.url(photoIndex);
        try {
          const response = await fetch(url);
          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = blobUrl;
          a.download = `photo-${photoIndex}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        } catch (e) {
          window.open(url, '_blank');
        }
      }

      // ── Simulate fail checkbox ────────────────────────────────────────────
      function setupSimulateCheckbox() {
        const checkbox = document.getElementById('simulate-fail');
        checkbox.addEventListener('change', () => {
          simulateFail = checkbox.checked;
          if (simulateFail) {
            handleImageError();
          } else {
            failCount = 0;
            document.getElementById('error-first').setAttribute('hidden', '');
            document.getElementById('error-persistent').setAttribute('hidden', '');
            loadPhoto();
          }
        });
      }

      // ── Photo loading ─────────────────────────────────────────────────────
      function loadPhoto() {
        const img = document.getElementById('main-photo');
        img.removeAttribute('hidden');
        document.getElementById('error-first').setAttribute('hidden', '');
        document.getElementById('error-persistent').setAttribute('hidden', '');
        img.onerror = handleImageError;
        if (simulateFail) {
          img.src = 'data:image/png,broken';
        } else {
          img.src = ZF.Unsplash.url(photoIndex);
        }
      }

      function handleImageError() {
        failCount++;
        const img          = document.getElementById('main-photo');
        const errorFirst   = document.getElementById('error-first');
        const errorPersist = document.getElementById('error-persistent');
        img.onerror = null;
        img.setAttribute('hidden', '');
        img.removeAttribute('src');
        if (failCount === 1) {
          errorFirst.removeAttribute('hidden');
          errorPersist.setAttribute('hidden', '');
        } else {
          errorFirst.setAttribute('hidden', '');
          errorPersist.removeAttribute('hidden');
        }
      }

      // ── Refresh button ────────────────────────────────────────────────────
      document.getElementById('refresh-btn').addEventListener('click', () => {
        loadPhoto();
      });

    })();
  </script>
</body>
</html>
